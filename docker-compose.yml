services:
  db:
    image: postgres:latest
    container_name: todo-db
    restart: unless-stopped
    ports:
      - ":5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
  backend:
    build:
      context: ./backend
    container_name: todo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      CORS_ORIGIN_IP: ${HOST_IP}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_HOST: todo-database
      DATABASE_PORT: 5432
      DATABASE_URL: postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@todo-database:5432/${DATABASE_NAME}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./frontend
    container_name: todo-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://${HOST_IP}:8000/api
      CHOKIDAR_USEPOLLING: true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173 --strictPort
    depends_on:
      - backend

volumes:
  todo_postgres_data:

networks:
  proxy:
    external: true